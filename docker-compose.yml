version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: mdps_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mdps_user
      POSTGRES_PASSWORD: mdps_pass
      POSTGRES_DB: mdps_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdps_user -d mdps_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mdps_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://mdps_user:mdps_pass@db:5432/mdps_db
      SYNC_DATABASE_URL: postgresql://mdps_user:mdps_pass@db:5432/mdps_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      APP_ENV: ${APP_ENV:-production}
      ALLOWED_ORIGINS: "http://localhost:5173,http://frontend:5173"
    volumes:
      - ./backend/ml/saved_models:/app/ml/saved_models
      - ./backend/reports:/app/reports
      - ./backend/ml/data:/app/ml/data
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mdps_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:80"

volumes:
  postgres_data:
